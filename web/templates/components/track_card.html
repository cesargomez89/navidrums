<div class="item item-bordered">
    <div class="item-media">
        <img src="{{if .AlbumArtURL}}{{.AlbumArtURL}}{{else}}https://via.placeholder.com/100?text=Trk{{end}}"
            alt="{{.Title}}" class="item-img item-img--lg">
        <div class="item-media-play" onclick="playTrack(this, '{{.ID}}', '{{.Title}}', '{{.Artist}}', '{{.AlbumArtURL}}', '{{.Album}}')">
            <svg class="icon-sm" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        </div>
    </div>
    <div class="item-body">
        <div class="item-title">{{.Title}}{{if .Version}} ({{.Version}}){{end}}</div>
        <div class="item-subtitle">
            <a href="/artist/{{.ArtistID}}" class="text-dim hover:text-accent">{{.Artist}}</a> &bull;
            <a href="/album/{{.AlbumID}}" class="text-dim hover:text-accent">{{.Album}}</a>
        </div>
    </div>
    <div class="item-actions item-actions--col">
        {{if eq .AudioQuality "HI_RES_LOSSLESS"}}
        <span class="quality-badge quality-badge--hires">HI-RES</span>
        {{else if eq .AudioQuality "LOSSLESS"}}
        <span class="quality-badge quality-badge--lossless">LOSSLESS</span>
        {{else if eq .AudioQuality "HIGH"}}
        <span class="quality-badge quality-badge--high">HIGH</span>
        {{else if eq .AudioQuality "LOW"}}
        <span class="quality-badge quality-badge--low">LOW</span>
        {{end}}
        <button class="btn btn-primary btn-sm" onclick="queueDownload('track', '{{.ID}}', this)" title="Download">
            <svg class="icon-sm" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </button>
    </div>
</div>
