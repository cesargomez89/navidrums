<!DOCTYPE html>
<html lang="en" data-theme="{{ .Theme }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navidrums Downloader</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="/static/js/app.js"></script>
</head>

<body>
    <nav>
        <a class="nav-logo" href="/">🎵 Navidrums</a>
        <div class="nav-links">
            <a href="/" {{if eq .ActivePage "search" }}class="active" {{end}}>Search</a>
            <a href="/queue" {{if eq .ActivePage "queue" }}class="active" {{end}}>Queue</a>
            <a href="/downloads" {{if eq .ActivePage "downloads" }}class="active" {{end}}>Downloads</a>
            <a href="/settings" {{if eq .ActivePage "settings" }}class="active" {{end}}>Settings</a>
        </div>
    </nav>
    <main>
        {{block "content" .}}{{end}}
    </main>

    <script>
        var currentAudio = null;
        var currentTrackId = null;
        var currentButton = null;
        var isPlaying = false;

        function playTrack(btn, providerId, title, artist, artUrl) {
            var quality = 'HIGH';

            if (currentTrackId === providerId && isPlaying) {
                togglePlay(btn);
                return;
            }

            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            if (currentButton) {
                setPlayIcon(currentButton, false);
            }

            currentTrackId = providerId;
            currentButton = btn;
            var streamUrl = '/stream/' + encodeURIComponent(providerId) + '?quality=' + quality;

            currentAudio = new Audio(streamUrl);
            currentAudio.play().then(function() {
                isPlaying = true;
                setPlayIcon(btn, true);
            }).catch(function(err) {
                console.error('Playback failed:', err);
            });

            currentAudio.onended = function() {
                isPlaying = false;
                setPlayIcon(btn, false);
                currentAudio = null;
                currentTrackId = null;
                currentButton = null;
            };
        }

        function setPlayIcon(btn, playing) {
            var svg = btn.querySelector('svg');
            if (!svg) return;
            if (playing) {
                svg.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
            } else {
                svg.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>';
            }
        }

        function togglePlay(btn) {
            if (!currentAudio) return;
            if (isPlaying) {
                currentAudio.pause();
                isPlaying = false;
                setPlayIcon(btn, false);
            } else {
                currentAudio.play();
                isPlaying = true;
                setPlayIcon(btn, true);
            }
        }

        function stopTrack() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
                isPlaying = false;
                currentTrackId = null;
            }
            if (currentButton) {
                setPlayIcon(currentButton, false);
                currentButton = null;
            }
        }
    </script>
</body>

</html>
