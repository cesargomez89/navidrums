{{define "content"}}
<h1>Downloads</h1>

<div class="toolbar mb-6">
    <div class="toolbar-row">
        <div class="toolbar-section toolbar-section--grow" style="flex-wrap: nowrap;">
            <input type="text" id="downloads-search" name="q" placeholder="Search by track, album, artist, genre..."
                onkeydown="if(event.key==='Enter') searchDownloads()" class="flex-1 min-w-0">
            <button onclick="searchDownloads()" class="btn btn-lg">
                <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Search
            </button>
        </div>
        <div class="toolbar-section">
            <select id="downloads-filter" onchange="applyFilter()" class="form-select w-full">
                <option value="">All downloads</option>
                <option value="no_genre">No genre</option>
                {{range .Genres}}
                <option value="genre:{{.}}">{{.}}</option>
                {{end}}
            </select>
        </div>

        <div class="toolbar-row">
            <div class="toolbar-section">
                <button id="btn-genre-selected" onclick="openGenreModal()" class="btn btn-outline btn-sm" disabled>
                    Set Metadata (<span id="genre-count">0</span>)
                </button>
                <button id="btn-sync" onclick="bulkSync()" class="btn btn-outline btn-sm">
                    <svg class="icon-sm" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    <span class="sync-text">Sync All</span>
                </button>
                <button id="btn-delete-selected" onclick="bulkDelete()" class="btn btn-outline-danger btn-sm" disabled>
                    <svg class="icon-sm icon--danger" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    Delete
                    (<span id="selected-count">0</span>)
                </button>
            </div>
        </div>
    </div>

    <!-- Genre Modal -->
    <div id="genre-modal-overlay" class="modal-overlay" style="display:none;" onclick="closeGenreModal(event)">
        <div class="modal" style="max-width: 640px;" onclick="event.stopPropagation()">
            <h2 class="mb-2">Set Metadata</h2>
            <p class="text-sm text-dim mb-4">
                Updates metadata for all selected tracks in the database and re-tags the audio files.
                Empty fields will be ignored.
            </p>
            
            <div class="form-grid mb-4">
                <div class="form-group">
                    <label for="genre-input">Genre</label>
                    <input type="text" id="genre-input" placeholder="Electronic, Jazz, Rock...">
                </div>
                <div class="form-group">
                    <label for="year-input">Year</label>
                    <input type="number" id="year-input" placeholder="2024" min="1900" max="2100">
                </div>
                <div class="form-group">
                    <label for="language-input">Language</label>
                    <select id="language-input">
                        <option value="">Select...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="country-input">Country</label>
                    <select id="country-input">
                        <option value="">Select...</option>
                    </select>
                </div>
            </div>

            <div class="section-header mb-3">
                <h3 class="text-sm text-dim">Mood & Style</h3>
            </div>
            <div class="form-grid mb-4">
                <div class="form-group relative">
                    <label for="mood-input">Mood</label>
                    <div class="tag-input-wrapper">
                        <div id="mood-tags" class="tag-list"></div>
                        <input type="text" id="mood-input" class="tag-input" placeholder="Type and press Enter..." autocomplete="off">
                    </div>
                    <div class="tag-suggestions" id="mood-suggestions"></div>
                </div>
                <div class="form-group relative">
                    <label for="style-input">Style</label>
                    <div class="tag-input-wrapper">
                        <div id="style-tags" class="tag-list"></div>
                        <input type="text" id="style-input" class="tag-input" placeholder="Type and press Enter..." autocomplete="off">
                    </div>
                    <div class="tag-suggestions" id="style-suggestions"></div>
                </div>
            </div>

            <div class="section-header mb-3">
                <h3 class="text-sm text-dim">Artists</h3>
            </div>
            <div class="form-grid mb-4">
                <div class="form-group">
                    <label for="artists-input">Artists</label>
                    <input type="text" id="artists-input" placeholder="Comma-separated">
                </div>
                <div class="form-group">
                    <label for="album-artists-input">Album Artists</label>
                    <input type="text" id="album-artists-input" placeholder="Comma-separated">
                </div>
                <div class="form-group form-group--full">
                    <label for="path-artist-input">Artist Directory (template path)</label>
                    <input type="text" id="path-artist-input" placeholder="{{.Artist}}">
                </div>
            </div>

            <div class="flex gap-2 justify-end">
                <button onclick="closeGenreModal()" class="btn btn-outline btn-sm">Cancel</button>
                <button onclick="applyMetadata()" class="btn btn-sm">Apply &amp; Sync to File</button>
            </div>
        </div>
    </div>

    <div id="downloads-list" hx-get="/htmx/downloads" hx-trigger="load">
        <div class="loading">Loading downloads...</div>
    </div>

    <script>
        // ─── helpers ───────────────────────────────────────────────────────
        function getSelectedIDs() {
            return Array.from(document.querySelectorAll('.download-cb:checked')).map(cb => cb.value);
        }

        function currentQ() {
            return document.getElementById('downloads-search').value;
        }

        function currentFilter() {
            return document.getElementById('downloads-filter').value;
        }

        function listParams() {
            var p = '';
            var q = currentQ();
            var f = currentFilter();
            if (q) p += 'q=' + encodeURIComponent(q);
            if (f) p += (p ? '&' : '') + 'filter=' + encodeURIComponent(f);
            return p ? '?' + p : '';
        }

        // ─── selection state ───────────────────────────────────────────────
        function onSelectionChange() {
            var ids = getSelectedIDs();
            var n = ids.length;
            document.getElementById('selected-count').textContent = n;
            document.getElementById('genre-count').textContent = n;

            var btnDel = document.getElementById('btn-delete-selected');
            var btnGenre = document.getElementById('btn-genre-selected');
            var btnSync = document.getElementById('btn-sync');

            if (btnDel) btnDel.disabled = (n === 0);
            if (btnGenre) btnGenre.disabled = (n === 0);
            if (btnSync) btnSync.querySelector('.sync-text').textContent = n === 0 ? 'Sync All' : 'Sync (' + n + ')';

            var all = document.querySelectorAll('.download-cb');
            var selAll = document.getElementById('select-all-cb');
            if (selAll) {
                selAll.checked = all.length > 0 && n === all.length;
                selAll.indeterminate = n > 0 && n < all.length;
            }
        }

        function toggleSelectAll(master) {
            document.querySelectorAll('.download-cb').forEach(cb => { cb.checked = master.checked; });
            onSelectionChange();
        }

        // ─── search & filter ───────────────────────────────────────────────
        function searchDownloads() {
            // clear filter when doing a text search
            document.getElementById('downloads-filter').value = '';
            htmx.ajax('GET', '/htmx/downloads' + listParams(), {
                target: '#downloads-list', swap: 'innerHTML'
            });
        }

        function applyFilter() {
            // clear search when applying a filter
            document.getElementById('downloads-search').value = '';
            htmx.ajax('GET', '/htmx/downloads' + listParams(), {
                target: '#downloads-list', swap: 'innerHTML'
            });
        }

        // ─── single delete (from row button) ───────────────────────────────
        function deleteDownload(id) {
            if (!confirm('Are you sure you want to delete this download?')) return;
            htmx.ajax('DELETE', '/htmx/download/' + id + listParams(), {
                target: '#downloads-list', swap: 'innerHTML'
            });
        }

        // ─── bulk delete ───────────────────────────────────────────────────
        function bulkDelete() {
            var ids = getSelectedIDs();
            if (ids.length === 0) return;
            if (!confirm('Delete ' + ids.length + ' selected download(s)?')) return;
            _postForm('/htmx/downloads/bulk-delete' + listParams(), ids);
        }

        // ─── bulk sync ─────────────────────────────────────────────────────
        function bulkSync() {
            var ids = getSelectedIDs();
            if (ids.length === 0) { syncAll(); return; }
            if (!confirm('Sync MusicBrainz metadata for ' + ids.length + ' selected download(s)?')) return;
            _postForm('/htmx/downloads/bulk-sync' + listParams(), ids);
        }

        // ─── sync all ──────────────────────────────────────────────────────
        function syncAll() {
            if (!confirm('This will update metadata for all completed tracks using MusicBrainz (ISRC lookup).\n\n' +
                '- Only missing fields will be filled (existing data preserved)\n' +
                '- Audio files will be re-tagged with updated metadata\n' +
                '- Tracks without ISRC will be skipped\n' +
                '- MusicBrainz rate limits to ~1 request/second\n' +
                '- Operation cannot be undone\n\n' +
                'Continue?')) return;
            htmx.ajax('POST', '/htmx/downloads/sync', {
                target: '#downloads-list', swap: 'innerHTML'
            });
        }

        // ─── genre modal ───────────────────────────────────────────────────
        let moodTagInput, styleTagInput;

        // ─── tag input options ──────────────────────────────────────────────
        let optionsLoaded = false;
        function loadBulkMoodStyleOptions() {
            if (optionsLoaded) return Promise.resolve();
            return Promise.all([
                fetch('/htmx/moods', { cache: 'no-store' }).then(r => r.json()),
                fetch('/htmx/styles', { cache: 'no-store' }).then(r => r.json()),
                fetch('/htmx/languages', { cache: 'no-store' }).then(r => r.json()),
                fetch('/htmx/countries', { cache: 'no-store' }).then(r => r.json())
            ]).then(([moodData, styleData, languageData, countryData]) => {
                moodTagInput = new TagInput({
                    inputId: 'mood-input',
                    tagsId: 'mood-tags',
                    suggestionsId: 'mood-suggestions',
                    options: moodData.moods
                });

                styleTagInput = new TagInput({
                    inputId: 'style-input',
                    tagsId: 'style-tags',
                    suggestionsId: 'style-suggestions',
                    options: styleData.styles
                });

                const languageSelect = document.getElementById('language-input');
                const countrySelect = document.getElementById('country-input');

                languageData.languages.forEach(lang => {
                    const option = document.createElement('option');
                    option.value = lang;
                    option.textContent = lang;
                    languageSelect.appendChild(option);
                });

                countryData.countries.forEach(country => {
                    const option = document.createElement('option');
                    option.value = country;
                    option.textContent = country;
                    countrySelect.appendChild(option);
                });
                optionsLoaded = true;
            });
        }

        function openGenreModal() {
            loadBulkMoodStyleOptions().then(() => {
                document.getElementById('path-artist-input').value = '';
                document.getElementById('artists-input').value = '';
                document.getElementById('album-artists-input').value = '';
                document.getElementById('year-input').value = '';
                document.getElementById('genre-input').value = '';
                
                if (moodTagInput) moodTagInput.reset();
                if (styleTagInput) styleTagInput.reset();

                document.getElementById('genre-modal-overlay').style.display = 'flex';
                setTimeout(() => document.getElementById('genre-input').focus(), 50);
            });
        }

        function closeGenreModal(e) {
            if (!e || e.target === document.getElementById('genre-modal-overlay')) {
                document.getElementById('genre-modal-overlay').style.display = 'none';
            }
        }

        function applyMetadata() {
            var pathArtist = document.getElementById('path-artist-input').value.trim();
            var artists = document.getElementById('artists-input').value.trim();
            var albumArtists = document.getElementById('album-artists-input').value.trim();
            var year = document.getElementById('year-input').value.trim();
            var genre = document.getElementById('genre-input').value.trim();
            var mood = moodTagInput && moodTagInput.tags.length > 0 ? moodTagInput.tags.join(';') : '';
            var style = styleTagInput && styleTagInput.tags.length > 0 ? styleTagInput.tags.join(';') : '';
            var language = document.getElementById('language-input').value.trim();
            var country = document.getElementById('country-input').value.trim();

            if (!pathArtist && !artists && !albumArtists && !year && !genre && !mood && !style && !language && !country) {
                alert('Please enter at least one field.'); return;
            }
            var ids = getSelectedIDs();
            if (ids.length === 0) return;
            document.getElementById('genre-modal-overlay').style.display = 'none';
            var params = new URLSearchParams();
            ids.forEach(id => params.append('ids[]', id));
            if (pathArtist) params.set('path_artist', pathArtist);
            if (artists) params.set('artists', artists);
            if (albumArtists) params.set('album_artists', albumArtists);
            if (year) params.set('year', year);
            if (genre) params.set('genre', genre);
            if (mood) params.set('mood', mood);
            if (style) params.set('style', style);
            if (language) params.set('language', language);
            if (country) params.set('country', country);
            fetch('/htmx/downloads/bulk-genre' + listParams(), { method: 'POST', body: params })
                .then(r => r.text())
                .then(html => {
                    document.getElementById('downloads-list').innerHTML = html;
                    htmx.process(document.getElementById('downloads-list'));
                    onSelectionChange();
                });
        }

        function _postForm(url, ids) {
            var params = new URLSearchParams();
            ids.forEach(id => params.append('ids[]', id));
            fetch(url, { method: 'POST', body: params })
                .then(r => r.text())
                .then(html => {
                    document.getElementById('downloads-list').innerHTML = html;
                    htmx.process(document.getElementById('downloads-list'));
                    onSelectionChange();
                });
        }

        document.body.addEventListener('htmx:afterSwap', function (e) {
            if (e.detail.target && e.detail.target.id === 'downloads-list') {
                onSelectionChange();
            }
        });
    </script>
    {{end}}
